<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница услуги — ALTourism</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/service.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ALTourism</a>
            <nav>
                <a href="citys.html">Города</a>
                <a href="add-city.html">Предложить город</a>
                <a href="auth.html" class="btn btn-outline">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="container service-container">
        <div id="service-content"></div>
        <div id="reviews-section">
            <h2>Отзывы</h2>
            <div id="reviews-list"></div>
            <form id="review-form">
                <h3>Оставить отзыв</h3>
                <div class="form-group">
                    <label for="review-rating">Ваша оценка (1-5):</label>
                    <input type="number" id="review-rating" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label for="review-comment">Комментарий:</label>
                    <textarea id="review-comment" required></textarea>
                </div>
                <button type="submit" class="btn btn-accent">Отправить отзыв</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="index.html">Главная</a>
                <a href="add-city.html">Предложить город</a>
                <a href="auth.html">Выйти</a>
                <a href="#">Контакты</a>
            </div>
            <p>© 2025 ALTourism. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/service.js"></script>
</body>
</html>
