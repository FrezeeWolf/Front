<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация | ALTourism</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ALTourism</a>
            <nav>
                Войдите для использования сайта
                <!-- <a href="auth.html" class="btn btn-outline">Войти</a> -->
            </nav>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Пароль</label>
                <input type="password" id="login-password" placeholder="Введите ваш пароль" required>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me"> Запомнить меня
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Забыли пароль?</a>
                </div>
            </div>
            
            <button type="submit" class="btn btn-accent">Войти</button>
            
            <div class="social-login">
                <p>Или войдите через:</p>
                <div class="social-buttons">
                    <button type="button" class="social-btn google">
                        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"/>
                            <path d="M12.24 24.0008C15.4764 24.0008 18.2058 22.9382 20.1944 21.1039L16.3274 18.1055C15.2516 18.8375 13.8626 19.252 12.2444 19.252C9.11376 19.252 6.45934 17.1399 5.50693 14.3003H1.51648V17.3912C3.55359 21.4434 7.70278 24.0008 12.24 24.0008Z" fill="#34A853"/>
                            <path d="M5.50253 14.3003C5.00011 12.8099 5.00011 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC04"/>
                            <path d="M12.24 4.74966C13.9508 4.7232 15.6043 5.36697 16.8433 6.54867L20.2694 3.12262C18.1 1.0855 15.2207 -0.034466 12.24 0.000808666C7.70277 0.000808666 3.55359 2.55822 1.51648 6.61481L5.50252 9.70575C6.45052 6.86173 9.10933 4.74966 12.24 4.74966Z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn facebook">
                        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.675 0H1.325C0.593 0 0 0.593 0 1.325V22.676C0 23.407 0.593 24 1.325 24H12.82V14.706H9.692V11.084H12.82V8.413C12.82 5.313 14.713 3.625 17.479 3.625C18.804 3.625 19.942 3.724 20.274 3.768V7.008L18.356 7.009C16.852 7.009 16.561 7.724 16.561 8.772V11.085H20.148L19.681 14.707H16.561V24H22.677C23.407 24 24 23.407 24 22.675V1.325C24 0.593 23.407 0 22.675 0Z" fill="#1877F2"/>
                        </svg>
                        Facebook
                    </button>
                </div>
            </div>
        </form>

        <!-- Форма регистрации -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="reg-name">Имя</label>
                <input type="text" id="reg-name" placeholder="Иван Иванов" required>
            </div>
            
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="reg-phone">Телефон</label>
                <input type="tel" id="reg-phone" placeholder="+7 (999) 123-45-67" required>
            </div>
            
            <div class="form-group">
                <label for="reg-password">Пароль</label>
                <input type="password" id="reg-password" placeholder="Не менее 8 символов" required minlength="8">
                <div class="password-strength">
                    <span class="strength-bar"></span>
                    <span class="strength-bar"></span>
                    <span class="strength-bar"></span>
                    <span class="strength-text"></span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="reg-confirm">Подтвердите пароль</label>
                <input type="password" id="reg-confirm" placeholder="Повторите пароль" required>
                <span class="error-message" id="password-error"></span>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="reg-agreement" required>
                <label for="reg-agreement">Я согласен с <a href="#">условиями использования</a> и <a href="#">политикой конфиденциальности</a></label>
            </div>
            
            <button type="submit" class="btn btn-accent">Зарегистрироваться</button>
        </form>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
            </div>
            <p>© 2026 ALTourism. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
